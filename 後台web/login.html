<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>臺灣登山申請一站式服務網｜後台管理系統</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&family=Noto+Serif+TC:wght@700;900&display=swap" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
      :root {
        --brand:       #173b2d;
        --brand-dark:  #0f2a1e;
        --brand-light: #285842;
        --wave-color:  #3a8c5c;
        --hero-color:  #ffffff;
        --hero-sub:    rgba(255,255,255,0.85);
        --icon-bg:     #285842;
        --btn-bg:      #173b2d;
        --card-bg:     #ffffff;
        --input-bg:    #EFEFEF;
        --input-focus: #E2EDF5;
        --text-muted:  #718096;
        --text-dark:   #1a202c;
        --border:      #CBD5E0;
        --input-ring:  #285842;
      }

      *, *::before, *::after { box-sizing: border-box; }

      html, body {
        min-height: 100%;
        margin: 0;
        font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
        overflow-x: hidden;
        overflow-y: auto;
        background: linear-gradient(160deg, #214f3c 0%, #173c2e 55%, #113127 100%);
      }

      .login-page {
        min-height: 100vh;
        min-height: 100svh;
        position: relative;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      @keyframes floatMist {
        0%   { transform: translateY(0) translateX(0); opacity: 0.55; }
        50%  { transform: translateY(-10px) translateX(-8px); opacity: 0.75; }
        100% { transform: translateY(0) translateX(0); opacity: 0.55; }
      }
      @keyframes floatWave {
        0%, 100% { transform: scale(1.04) translate(0, 0); }
        50%       { transform: scale(1.04) translate(-8px, -10px); }
      }
      @keyframes riseIn {
        from { opacity: 0; transform: translateY(18px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .wave-layer {
        position: absolute;
        bottom: -15px;
        left: 0;
        width: 100%;
        z-index: 0;
        animation: floatWave 5s ease-in-out infinite;
        transform-origin: bottom center;
      }

      .mountain-deco {
        position: absolute;
        bottom: 0;
        left: 3%;
        z-index: 1;
        width: clamp(300px, 34vw, 480px);
        pointer-events: none;
      }

      .mist-cloud {
        animation: floatMist 6s ease-in-out infinite;
      }

      .login-layout {
        flex: 1;
        width: 100%;
        max-width: 1120px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: clamp(36px, 4vw, 64px);
        padding: clamp(48px, 7vh, 88px) clamp(24px, 5vw, 64px) clamp(88px, 10vh, 120px);
        margin: 0 auto;
        position: relative;
        z-index: 10;
        animation: riseIn 0.6s ease both;
      }

      .login-hero {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        flex: 0 1 420px;
        max-width: 420px;
        min-width: 0;
        margin-top: 0;
      }

      .login-hero .logo-wrap {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 28px;
      }

      .login-hero .logo-wrap img.logo-icon {
        width: 52px;
        height: 52px;
        object-fit: contain;
        flex: 0 0 auto;
        filter: brightness(0) invert(1);
      }

      .login-hero .logo-wrap img.logo-full {
        max-height: 52px;
        object-fit: contain;
        filter: brightness(0) invert(1);
      }

      .login-hero .hero-title {
        font-family: 'Noto Serif TC', serif;
        font-size: clamp(30px, 3.4vw, 50px);
        font-weight: 900;
        line-height: 1.35;
        letter-spacing: 2px;
        color: var(--hero-color);
        margin: 0 0 12px;
      }

      .login-hero .hero-sub {
        font-size: clamp(17px, 2vw, 28px);
        font-weight: 700;
        letter-spacing: 5px;
        color: var(--hero-sub);
        font-family: 'Noto Serif TC', serif;
      }

      .card-icon {
        display: block;
        margin: 5px auto 25px;
        object-fit: fill;
        width: 60%;
        height: auto;
      }

      .login-card {
        background: var(--card-bg);
        border-radius: 20px;
        padding: 28px 32px 28px;
        box-shadow: 0 12px 48px rgba(0,0,0,0.18);
        margin-top: 40px;
        width: 100%;
        max-width: 440px;
        min-width: 0;
        flex: 0 1 440px;
      }

      .card-header {
        margin-bottom: 24px;
        padding-bottom: 16px;
        border-bottom: 1px solid #e8eee9;
      }

      .card-title {
        margin: 0 0 4px;
        color: #1e4736;
        font-size: 18px;
        font-weight: 850;
      }

      .card-sub {
        margin: 0;
        color: var(--text-muted);
        font-size: 13px;
        font-weight: 600;
      }

      .form-row {
        display: flex;
        align-items: center;
        gap: 0;
        margin-bottom: 16px;
      }

      .form-row.last {
        margin-bottom: 24px;
      }

      .login-icon {
        width: 48px;
        height: 48px;
        min-width: 48px;
        background-color: var(--icon-bg);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        z-index: 2;
        margin-right: 10px;
        box-shadow: 2px 0 5px rgba(0,0,0,0.08);
        flex-shrink: 0;
      }

      .login-icon i { font-size: 22px; }

      .login-input {
        flex: 1;
        background-color: var(--input-bg);
        border: none;
        border-radius: 24px;
        padding: 0 20px 0 22px;
        height: 48px;
        font-size: 15px;
        font-family: inherit;
        outline: none;
        transition: 0.2s;
        width: 100%;
        min-width: 0;
      }

      .login-input:focus {
        background-color: var(--input-focus);
        box-shadow: inset 0 0 0 2px var(--input-ring);
      }

      .css-vcode {
        height: 48px;
        width: 120px;
        border-radius: 8px;
        flex-shrink: 0;
        cursor: pointer;
        margin-left: 10px;
        display: block;
        object-fit: cover;
        border: 1px solid var(--border);
        box-shadow: inset 0 0 5px rgba(0,0,0,0.08);
      }

      .btn-login {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 50px;
        background: linear-gradient(135deg, #285842 0%, #173b2d 100%);
        border: none;
        border-radius: 10px;
        color: #fff;
        font-size: 17px;
        font-weight: 800;
        letter-spacing: 3px;
        text-decoration: none;
        margin-bottom: 16px;
        cursor: pointer;
        font-family: inherit;
        transition: filter 0.2s;
      }

      .btn-login:hover { filter: brightness(1.12); }

      .action-row {
        display: flex;
        gap: 8px;
      }

      .btn-action {
        flex: 1;
        height: 42px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
        transition: 0.2s;
        font-family: inherit;
        border: none;
        background: transparent;
      }

      .btn-action-ghost {
        color: var(--text-muted);
        border: 1px solid transparent !important;
      }

      .btn-action-ghost:hover {
        color: var(--text-dark);
        background-color: #f1f5f9;
        border-color: var(--border) !important;
      }

      .btn-action-outline {
        color: #4A5568;
        border: 1px solid var(--border) !important;
      }

      .btn-action-outline:hover {
        background-color: #f1f5f9;
        border-color: #A0AEC0 !important;
      }

      .login-footer {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        text-align: center;
        padding: 12px;
        font-size: 13px;
        color: rgba(255,255,255,0.75);
        z-index: 20;
      }

      @media (max-width: 900px) {
        .login-layout {
          flex-direction: column;
          justify-content: flex-start;
          gap: 16px;
          padding: clamp(28px, 6vh, 56px) 20px 20px;
          text-align: center;
        }

        .login-hero {
          align-items: center;
          flex: 0 1 auto;
          width: 100%;
          max-width: 440px;
        }

        .login-hero .hero-title {
          font-size: clamp(28px, 8vw, 42px);
        }

        .login-hero .hero-sub {
          font-size: clamp(16px, 4.6vw, 24px);
          letter-spacing: 3px;
        }

        .login-card {
          flex: 0 1 auto;
          width: min(100%, 440px);
          margin-top: 0;
          padding: 24px clamp(18px, 5vw, 28px);
        }

        .mountain-deco {
          left: 50%;
          width: clamp(240px, 70vw, 420px);
          transform: translateX(-50%);
        }

        .login-footer {
          position: relative;
          margin-top: auto;
          padding: 12px 16px 16px;
        }
      }

      @media (max-width: 540px) {
        .login-layout {
          gap: 12px;
          padding: 24px 16px 16px;
        }

        .login-hero .hero-title {
          font-size: clamp(24px, 9vw, 34px);
          line-height: 1.28;
          letter-spacing: 1px;
        }

        .login-hero .hero-sub {
          font-size: clamp(14px, 4.2vw, 18px);
          letter-spacing: 2px;
        }

        .login-card {
          border-radius: 18px;
          padding: 22px 16px 24px;
        }

        .card-icon {
          width: min(62%, 210px);
          margin-bottom: 20px;
        }

        .form-row {
          margin-bottom: 14px;
        }

        .form-row.last {
          margin-bottom: 22px;
        }

        .login-icon {
          width: 44px;
          height: 44px;
          min-width: 44px;
          margin-right: 8px;
        }

        .login-input {
          height: 44px;
          padding: 0 16px;
          font-size: 16px;
        }

        .css-vcode {
          width: clamp(86px, 28vw, 112px);
          height: 44px;
          margin-left: 8px;
        }

        .btn-login {
          height: 48px;
          font-size: 16px;
        }

        .btn-action {
          min-height: 44px;
          height: auto;
        }
      }

      @media (max-width: 360px) {
        .login-layout {
          padding-inline: 12px;
        }

        .login-card {
          padding-inline: 14px;
        }

        .login-icon {
          width: 42px;
          height: 42px;
          min-width: 42px;
        }

        .css-vcode {
          width: 84px;
        }
      }

      @media (max-width: 900px) and (max-height: 640px) {
        .login-layout {
          padding-top: 20px;
          gap: 10px;
        }

        .card-icon {
          width: min(54%, 170px);
          margin-bottom: 16px;
        }

        .login-hero .hero-title {
          font-size: clamp(22px, 7vw, 30px);
        }
      }
    </style>
  </head>
  <body>
    <div class="login-page">

      <div class="wave-layer">
        <svg viewBox="0 0 1440 260" xmlns="http://www.w3.org/2000/svg">
          <path fill="rgba(255,255,255,0.28)"
            d="M0,160L48,149C96,139,192,117,288,117C384,117,480,139,576,149C672,160,768,160,864,144C960,128,1056,96,1152,96C1248,96,1344,128,1392,144L1440,160L1440,260L0,260Z"/>
        </svg>
      </div>

      <div class="mountain-deco">
        <svg viewBox="0 0 480 320" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polygon points="0,260 90,100 180,260" fill="rgba(255,255,255,0.06)"/>
          <polygon points="100,260 220,60 340,260" fill="rgba(255,255,255,0.08)"/>
          <polygon points="260,260 360,90 460,260" fill="rgba(255,255,255,0.06)"/>
          <polygon points="60,260 190,30 320,260" fill="rgba(255,255,255,0.11)"/>
          <polygon points="160,80 190,30 220,80 205,72 190,52 175,72" fill="rgba(255,255,255,0.55)"/>
          <rect x="70"  y="220" width="8"  height="40" rx="2" fill="rgba(255,255,255,0.15)"/>
          <rect x="90"  y="215" width="10" height="45" rx="2" fill="rgba(255,255,255,0.13)"/>
          <rect x="350" y="218" width="8"  height="42" rx="2" fill="rgba(255,255,255,0.15)"/>
          <rect x="370" y="212" width="10" height="48" rx="2" fill="rgba(255,255,255,0.13)"/>
          <ellipse class="mist-cloud" cx="80"  cy="140" rx="48" ry="18" fill="rgba(255,255,255,0.09)"/>
          <ellipse class="mist-cloud" cx="380" cy="120" rx="40" ry="14" fill="rgba(255,255,255,0.08)"/>
          <ellipse class="mist-cloud" cx="230" cy="160" rx="60" ry="20" fill="rgba(255,255,255,0.07)"/>
          <path d="M190 260 Q210 220 225 190 Q245 160 240 130"
                stroke="rgba(255,255,255,0.25)" stroke-width="2"
                stroke-dasharray="6 5" stroke-linecap="round" fill="none"/>
          <circle cx="224" cy="127" r="5" fill="rgba(255,255,255,0.6)"/>
          <line x1="224" y1="132" x2="224" y2="144" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
          <line x1="224" y1="135" x2="219" y2="140" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
          <line x1="224" y1="135" x2="229" y2="140" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
        </svg>
      </div>

      <div class="login-layout">
        <div class="login-hero">
          <h1 class="hero-title">臺灣登山申請<br>一站式服務網</h1>
          <div class="hero-sub">後台管理系統</div>
        </div>

        <div class="login-card">
          <img src="assets/img/national-park-icon.svg" alt="" aria-hidden="true" class="card-icon" />
          <div class="form-row">
            <div class="login-icon"><i class="ph ph-user"></i></div>
            <input class="login-input" placeholder="請輸入帳號" type="text" autocomplete="off" />
          </div>

          <div class="form-row">
            <div class="login-icon"><i class="ph ph-key"></i></div>
            <input class="login-input" placeholder="請輸入密碼" type="password" autocomplete="off" />
          </div>

          <div class="form-row last">
            <div class="login-icon"><i class="ph ph-fingerprint"></i></div>
            <input type="text" maxlength="6" class="login-input" placeholder="請輸入驗證碼" autocomplete="off" />
            <img class="css-vcode" id="captcha" src="assets/img/captcha.png" title="點擊更換驗證碼" alt="驗證碼" onclick="changeCaptcha()" />
          </div>

          <button class="btn-login" type="button" onclick="location.href='news.html'">登　入</button>

          <div class="action-row">
            <button class="btn-action btn-action-outline" type="button">
              <i class="ph ph-lock-key"></i> 忘記密碼
            </button>
          </div>
        </div>
      </div>

      <footer class="login-footer">
        Copyright &copy; 2026 內政部國家公園署 版權所有
      </footer>
    </div>

    <script>
      function changeCaptcha() {
        var el = document.getElementById('captcha');
        el.src = 'img/cert.png?t=' + Date.now();
      }
    </script>
  </body>
</html>
